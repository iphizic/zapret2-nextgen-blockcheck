version: 1
kind: transition_matrix
description: >
  Transition cost model for zapret2 adaptive strategy checker.
  Used by TSP-like local ordering to minimize expensive jumps between
  strategy families while still allowing fallback exploration.

metadata:
  compatible_with:
    - strategies.yaml
  cost_scale:
    min: 0
    max: 100
    meaning:
      0: same candidate / no transition
      1-10: nearly identical strategy
      11-25: same family or close neighbor
      26-45: related family
      46-70: expensive semantic jump
      71-100: last-resort / disruptive jump


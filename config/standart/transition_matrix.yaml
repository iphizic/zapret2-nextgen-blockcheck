param_transition_costs:
  split_pos:
    default_same_param_cost: 0
    default_neighbor_cost: 4
    default_non_neighbor_cost: 12
    ordered_sets:
      http:
        values: [method+2, host, midsld]
        neighbor_cost: 5
        non_neighbor_cost: 12
      tls:
        values: [1, 2, sniext+1, sniext+4, host+1, midsld, endhost-1]
        neighbor_cost: 4
        non_neighbor_cost: 13

  ipfrag_pos:
    default_same_param_cost: 0
    default_neighbor_cost: 5
    default_non_neighbor_cost: 15
    ordered_values: [4, 8, 16, 32, 48, 64, 96]

  repeats:
    default_same_param_cost: 0
    default_neighbor_cost: 4
    default_non_neighbor_cost: 14
    ordered_values: [1, 2, 5, 10, 20, 30]

  seqovl_len:
    default_same_param_cost: 0
    default_neighbor_cost: 5
    default_non_neighbor_cost: 15
    ordered_values: [1, 2, 4, 8, 16]

  wssize:
    default_same_param_cost: 0
    default_neighbor_cost: 6
    default_non_neighbor_cost: 18
    ordered_values: [1, 2, 4, 8, 16]

  fooling:
    default_same_param_cost: 0
    pair_costs:
      none:
        badsum: 10
        md5sig: 14
        autottl: 12
        hopbyhop: 18
        destopt: 18
      badsum:
        none: 10
        md5sig: 12
        autottl: 14
      md5sig:
        none: 14
        badsum: 12
        autottl: 16
      autottl:
        none: 12
        badsum: 14
        md5sig: 16

tsp_local_ordering:
  enabled: true
  method: nearest_neighbor_2opt
  window_size: 24
  max_2opt_iterations: 32
  preserve_protocol_groups: true
  preserve_target_groups: true
  avoid_cross_protocol_jumps: true
  seed_order:
    - baseline
    - cheap
    - medium
    - fallback
    - aggressive

  edge_cost_formula: >
    edge_cost =
      family_transition_cost
      + action_transition_cost * 0.40
      + param_transition_cost * 0.35
      + protocol_transition_cost * 0.50
      + abs(cost_a - cost_b) * strategy_cost_delta
      + abs(risk_a - risk_b) * strategy_risk_delta
      - bayes_bonus_if_promising
      + penalties

adaptive_adjustments:
  on_success:
    same_family_next_bonus: -15
    same_param_neighbors_bonus: -10
    combo_with_successful_family_bonus: -8
    expensive_fallback_penalty: 12
  on_partial:
    same_family_next_bonus: -8
    neighbor_params_bonus: -6
    combo_with_partial_bonus: -5
  on_soft_failure:
    same_exact_candidate_penalty: 20
    same_family_small_penalty: 5
    neighbor_params_penalty: 3
  on_hard_strategy_failure:
    same_exact_candidate_penalty: 45
    same_family_penalty: 12
    combo_using_candidate_penalty: 20
  on_infrastructure_failure:
    do_not_update_strategy_score: true
    retry_later_penalty: 0
  on_target_failure:
    pause_target: true
    do_not_update_strategy_score: true

early_pruning:
  enabled: true
  do_not_prune:
    - baseline
  rules:
    - id: prune_exact_candidate_after_hard_strategy_fail
      scope: candidate
      condition:
        hard_strategy_failures: ">= 1"
      action: deprioritize
      penalty: 45

    - id: prune_family_after_independent_soft_failures
      scope: family
      condition:
        soft_failures: ">= 3"
        successes: "== 0"
        independent_params: ">= 2"
      action: deprioritize
      penalty: 25

    - id: skip_combo_without_signal
      scope: combo
      condition:
        combo_requires_signal: true
        base_family_success_or_partial: false
      action: delay_to_audit
      penalty: 35

    - id: avoid_aggressive_before_medium_exhausted
      scope: family
      families:
        - ipfrag_tcp
        - oob
        - wssize
        - synack
        - synack_split
      condition:
        medium_families_have_signal: true
      action: delay
      penalty: 30

    - id: do_not_penalize_infrastructure_failure
      scope: candidate
      condition:
        failure_kind: InfrastructureFailure
      action: no_score_update
      penalty: 0

fallback_paths:
  http:
    - [baseline, http_trick, split, disorder, fake, fakedsplit, seqovl, fake_split, ipfrag_tcp, oob]
    - [baseline, split, fake, fake_split, seqovl, ipfrag_tcp, oob]
  tls13:
    - [baseline, split, disorder, fake, fakedsplit, fakeddisorder, seqovl, fake_split, ipfrag_tcp, oob]
    - [baseline, fake, split, fake_split, seqovl, ipfrag_tcp, oob]
  tls12:
    - [baseline, split, disorder, fake, fakedsplit, fakeddisorder, seqovl, fake_split, ipfrag_tcp, wssize, oob]
    - [baseline, fake, split, fake_split, seqovl, wssize, ipfrag_tcp, oob]
  quic:
    - [baseline, udp_fake, udp_ipfrag, udp_fake_ipfrag, udplen, ipv6_ext]
    - [baseline, udp_ipfrag, udp_fake, udp_fake_ipfrag, ipv6_ext, udplen]

audit_policy:
  enabled: true
  run_after_primary_found: false
  audit_repeats: 1
  include:
    - delayed_combos
    - expensive_fallbacks
    - low_posterior_but_unseen
  exclude:
    - disabled
    - unsupported_protocol
    - target_hard_fail

rendering_hints:
  strategy_key_fields:
    - protocol
    - family
    - action
    - params
  matrix_lookup_order:
    - exact_candidate_pair
    - action_transition_costs
    - family_transition_costs
    - protocol_transition_costs
    - defaults.unknown_transition_cost

version: 1
kind: bayesian_priors
description: Diverse maximum-coverage Bayesian priors for zapret2-nextgen-blockcheck.
  Weak priors; runtime observations should dominate.
metadata:
  compatible_with:
  - strategies_maximum_diverse.yaml
  - transition_matrix_maximum_diverse.yaml
  model:
    distribution: beta_bernoulli
    sampler: thompson_sampling
    unit: strategy_candidate
  beta_pair_format:
  - alpha
  - beta
  notes:
  - StrategyFailure updates candidate/family priors.
  - InfrastructureFailure, TargetFailure and Cancelled do not update strategy priors.
  - Priors intentionally avoid overcommitting to any single family.
global:
  enabled: true
  sampler: thompson
  random_seed: null
  default_prior:
  - 2.0
  - 2.0
  unknown_strategy_prior:
  - 1.5
  - 2.5
  disabled_strategy_prior:
  - 1.0
  - 8.0
  confidence:
    primary_threshold_mean: 0.8
    fallback_threshold_mean: 0.6
    discard_threshold_mean: 0.3
    min_attempts_primary: 3
    min_attempts_fallback: 2
  decay:
    enabled: true
    mode: per_run
    decay_per_run: 0.9
    floor_alpha: 1.0
    floor_beta: 1.0
    max_alpha: 80.0
    max_beta: 80.0
  scoring_penalties:
    cost: 0.03
    risk: 0.04
    expected_time: 0.02
    transition_cost: 0.006
    instability: 0.1
    recent_failure: 0.05
    recent_success_bonus: 0.05
  thompson_sampling:
    exploration_floor: 0.03
    fallback_exploration_rate: 0.1
    max_consecutive_same_family: 4
    reserve_budget_for_fallback_families: true
outcome_updates:
  Success:
    alpha: 1.0
    beta: 0.0
    family_alpha: 0.7
    family_beta: 0.0
  PartialSuccess:
    alpha: 0.55
    beta: 0.2
    family_alpha: 0.4
    family_beta: 0.1
  Timeout:
    alpha: 0.0
    beta: 0.7
    family_alpha: 0.0
    family_beta: 0.4
  TcpReset:
    alpha: 0.0
    beta: 0.9
    family_alpha: 0.0
    family_beta: 0.5
  TlsAlert:
    alpha: 0.0
    beta: 0.8
    family_alpha: 0.0
    family_beta: 0.45
  HttpBlockPage:
    alpha: 0.0
    beta: 1.0
    family_alpha: 0.0
    family_beta: 0.6
  EmptyResponse:
    alpha: 0.0
    beta: 0.65
    family_alpha: 0.0
    family_beta: 0.35
  BodyTooSmall:
    alpha: 0.0
    beta: 0.7
    family_alpha: 0.0
    family_beta: 0.35
  InvalidHttpResponse:
    alpha: 0.0
    beta: 0.8
    family_alpha: 0.0
    family_beta: 0.4
  Refused:
    alpha: 0.0
    beta: 0.0
    family_alpha: 0.0
    family_beta: 0.0
    classification: TargetFailure
  NetworkUnreachable:
    alpha: 0.0
    beta: 0.0
    family_alpha: 0.0
    family_beta: 0.0
    classification: TargetFailure
  DnsFailure:
    alpha: 0.0
    beta: 0.0
    family_alpha: 0.0
    family_beta: 0.0
    classification: TargetFailure
  InfrastructureFailure:
    alpha: 0.0
    beta: 0.0
    family_alpha: 0.0
    family_beta: 0.0
    classification: InfrastructureFailure
  Cancelled:
    alpha: 0.0
    beta: 0.0
    family_alpha: 0.0
    family_beta: 0.0
    classification: Cancelled
  InternalError:
    alpha: 0.0
    beta: 0.0
    family_alpha: 0.0
    family_beta: 0.0
    classification: InfrastructureFailure
failure_kind_policy:
  StrategyFailure:
    update_candidate: true
    update_family: true
    update_protocol: true
  InfrastructureFailure:
    update_candidate: false
    update_family: false
    update_protocol: false
    retry_allowed: true
  TargetFailure:
    update_candidate: false
    update_family: false
    update_protocol: false
    pause_target: true
  Cancelled:
    update_candidate: false
    update_family: false
    update_protocol: false

candidate_key_policy:
  key_fields:
  - protocol
  - family
  - action
  - args
  normalize:
  - sort_args
  - collapse_whitespace
  - strip_runtime_fields
selection_formula:
  description: posterior mean minus cost/risk/transition penalties plus bounded exploration
  formula: mean(alpha,beta) - cost*w_cost - risk*w_risk - transition_cost*w_transition
    + exploration
pruning_interaction:
  low_posterior_policy:
    enabled: true
    min_attempts: 3
    mean_below: 0.25
    action: deprioritize
  high_posterior_policy:
    enabled: true
    min_attempts: 2
    mean_above: 0.75
    action: prefer

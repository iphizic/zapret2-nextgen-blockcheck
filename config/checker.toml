[workers]
count = 64

[queue]
base_qnum = 10
qnum_count = 164

[source_port]
mode = "os_assigned"
bind_ipv4 = "0.0.0.0"
bind_ipv6 = "::"

[probe]
backend = "native"
connect_timeout_ms = 3000
tls_timeout_ms = 3000
first_byte_timeout_ms = 5000
total_timeout_ms = 10000
max_read_bytes = 65536
user_agent = "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:150.0) Gecko/20100101 Firefox/150.0"
method = "GET"
read_mode = "body"
min_body_bytes = 32000
test_count = 5
base_domains = [
  "youtube.com",
  "istio.io",
]

[probe.protocols]
http = true
tls12 = true
tls13 = false
quic = true
preferred = "tls12"

[nfqws]
binary = "/opt/zapret2/binaries/linux-arm64/nfqws2"
library_paths = ["/opt/zapret2/binaries/linux-arm64"]
base_args = [
  "--user=daemon",
  "--fwmark=0x40000000",
  "--lua-init=@/opt/zapret2/lua/zapret-lib.lua",
  "--lua-init=@/opt/zapret2/lua/zapret-antidpi.lua",
  "--lua-init=@/opt/zapret2/lua/zapret-auto.lua",
]
start_grace_ms = 100
stop_timeout_ms = 1000
log_stderr = true
log_stdout = false

[firewall]
backend = "nftables"
table = "zapret_checker"
hook = "output"
priority = "mangle"
cleanup_on_start = true
cleanup_on_exit = true

[debug]
enable_curl_fallback = false
keep_rules_on_failure = false
verbose_nfqws = false

[strategies]
file = "config/standart/strategies.yaml"
transition_matrix = "config/standart/transition_matrix.yaml"
soft_fail_family_limit = 6
successful_strategy_limit = 80
search_mode = "expand"
max_candidates = 1000
max_per_family = 64
max_per_action = 20
round_robin_families = true

[bayes]
state_file = "config/standart/bayesian_priors.yaml"
